services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backupeer-api
    restart: unless-stopped
    expose:
      - 8080
    volumes:
      - backupeer_data:/data
    environment:
      - BACKUPEER_PORT=8080
      - BACKUPEER_DATA_DIR=/data
      - BACKUPEER_ADMIN_USER=admin
      - BACKUPEER_ADMIN_PASS=admin123
      - BACKUPEER_SECRET_KEY=change-me-in-production
      - BACKUPEER_ENCRYPTION_KEY=
      - BACKUPEER_S3_ENDPOINT=
      - BACKUPEER_S3_REGION=auto
      - BACKUPEER_S3_BUCKET=backups
      - BACKUPEER_S3_ACCESS_KEY=
      - BACKUPEER_S3_SECRET_KEY=
      - BACKUPEER_S3_PATH_STYLE=true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: backupeer-ui
    restart: unless-stopped
    ports:
      - "8085:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  backupeer_data:
