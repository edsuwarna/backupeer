services:
  timescaledb:
    image: timescale/timescaledb-ha:pg16
    container_name: jagad-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=jagad_secret
      - POSTGRES_DB=jagad
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jagad-api
    restart: unless-stopped
    expose:
      - 8080
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - jagad_data:/data
    environment:
      - JAGAD_PORT=8080
      - JAGAD_DATA_DIR=/data
      - JAGAD_DATABASE_URL=postgres://postgres:jagad_secret@timescaledb:5432/jagad?sslmode=disable
      - JAGAD_ADMIN_USER=admin
      - JAGAD_ADMIN_PASS=admin123
      - JAGAD_SECRET_KEY=change-me-in-production
      - JAGAD_ENCRYPTION_KEY=
      - JAGAD_S3_ENDPOINT=
      - JAGAD_S3_REGION=auto
      - JAGAD_S3_BUCKET=backups
      - JAGAD_S3_ACCESS_KEY=
      - JAGAD_S3_SECRET_KEY=
      - JAGAD_S3_PATH_STYLE=true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: jagad-ui
    restart: unless-stopped
    ports:
      - "8085:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  jagad_data:
  timescaledb_data:
